{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Casos</h2><a class="btn btn-main" href="{% url 'cases:create' %}">Nuevo caso</a>
</div>
<form method="get" class="row g-2 mb-3">
  <div class="col-md-4"><input class="form-control" name="q" placeholder="Folio, estudiante, RUT" value="{{ request.GET.q }}"></div>
  <div class="col-md-2"><button class="btn btn-outline-dark w-100">Buscar</button></div>
</form>
<div class="card"><div class="table-responsive"><table class="table app-table mb-0"><thead><tr><th>Folio</th><th>Título</th><th>Estudiante</th><th>Área</th><th>Estado</th><th></th></tr></thead>
<tbody>{% for case in cases %}<tr><td>{{ case.folio }}</td><td>{{ case.title }}</td><td>{{ case.student.full_name }}</td><td>{{ case.current_area }}</td><td><span class="badge bg-status">{{ case.get_status_display }}</span></td><td><a href="{% url 'cases:detail' case.pk %}">Ver</a></td></tr>{% empty %}<tr><td colspan="6">No hay casos.</td></tr>{% endfor %}</tbody>
</table></div></div>
{% endblock %}
