{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3">
  <div>
    <h2>Nueva ficha psicopedagógica</h2>
    <p class="page-subtitle">Registra el inicio de acompañamiento especializado.</p>
  </div>
  <a class="btn btn-soft" href="{% url 'psychopedagogy:list' %}"><i class="bi bi-arrow-left me-1"></i>Volver</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="d-flex justify-content-end mt-3">
        <button class="btn btn-main" type="submit"><i class="bi bi-save me-1"></i>Guardar ficha</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
