{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h2>Estudiantes</h2><a class="btn btn-main" href="{% url 'students:create' %}">Nuevo</a></div>
<div class="card"><div class="table-responsive"><table class="table app-table mb-0"><thead><tr><th>Nombre</th><th>RUT</th><th>Carrera</th><th></th></tr></thead><tbody>{% for s in students %}<tr><td>{{ s.full_name }}</td><td>{{ s.rut }}</td><td>{{ s.career }}</td><td><a href="{% url 'students:update' s.pk %}">Editar</a></td></tr>{% empty %}<tr><td colspan="4">Sin estudiantes</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
