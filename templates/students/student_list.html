{% extends 'base.html' %}
{% block content %}
<div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3">
  <div>
    <h2>Estudiantes</h2>
    <p class="page-subtitle">Registro institucional de estudiantes.</p>
  </div>
  <a class="btn btn-main" href="{% url 'students:create' %}"><i class="bi bi-person-plus me-1"></i>Nuevo</a>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table app-table">
      <thead><tr><th>Nombre</th><th>RUT</th><th>Carrera</th><th>Acciones</th></tr></thead>
      <tbody>
      {% for s in students %}
      <tr><td>{{ s.full_name }}</td><td>{{ s.rut }}</td><td>{{ s.career }}</td><td><a class="btn btn-sm btn-soft" href="{% url 'students:update' s.pk %}"><i class="bi bi-pencil-square me-1"></i>Editar</a></td></tr>
      {% empty %}
      <tr><td colspan="4" class="text-center text-muted py-4">Sin estudiantes.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
