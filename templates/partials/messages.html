{% if messages %}
  <script id="django-messages-data" type="application/json">
    [
      {% for message in messages %}
        {
          "message": "{{ message|escapejs }}",
          "tags": "{{ message.tags|default:''|escapejs }}"
        }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ]
  </script>
{% endif %}
