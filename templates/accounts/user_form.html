{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="page-header">
  <h2>Crear usuario</h2>
  <p class="page-subtitle">Alta de usuario y perfil institucional.</p>
</div>
<div class="card">
  <div class="card-body">
    <form method="post">{% csrf_token %}{{ form|crispy }}{{ profile_form|crispy }}<button class="btn btn-main"><i class="bi bi-person-plus me-1"></i>Crear</button></form>
  </div>
</div>
{% endblock %}
